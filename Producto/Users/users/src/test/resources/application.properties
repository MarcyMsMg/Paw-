spring.datasource.url=jdbc:h2:mem:users;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS users_schema
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=users_schema
spring.jpa.open-in-view=false

pawplus.security.jwt-secret=test-secret-key-with-at-least-32-bytes
pawplus.security.jwt-expiration-minutes=30
pawplus.internal-api-key=test-internal-api-key
pawplus.admin.email=admin@test.local
pawplus.admin.password=TestPassword123!
