spring.datasource.url=jdbc:h2:mem:feed;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

paw.security.jwt-secret=test-secret-key-with-at-least-32-bytes
paw.security.forwarded-headers-enabled=false
paw.services.users.base-url=http://localhost:18081/api
paw.services.users.internal-api-key=test-internal-api-key
paw.cors.allowed-origins=http://localhost:5173

paw.services.notifications.base-url=http://localhost:18086/api
paw.services.notifications.internal-api-key=test-internal-api-key
