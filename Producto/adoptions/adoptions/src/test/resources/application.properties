spring.datasource.url=jdbc:h2:mem:adoptions;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS adoptions
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=adoptions
spring.jpa.open-in-view=false

paw.security.jwt-secret=test-secret-key-with-at-least-32-bytes
paw.security.forwarded-headers-enabled=false
paw.services.users.base-url=http://localhost:18081/api
paw.services.users.internal-api-key=test-internal-api-key
paw.adoptions.forms.max-custom-fields=15
paw.cors.allowed-origins=http://localhost:5173
