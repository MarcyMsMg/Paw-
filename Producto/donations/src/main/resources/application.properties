spring.application.name=donations
server.port=${PORT:${SERVER_PORT:8083}}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:1}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.initialization-fail-timeout=${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:1}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.default_schema=donations
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=${HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:true}
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

services.campaigns.base-url=${SERVICES_CAMPAIGNS_BASE_URL:http://localhost:8082/api}
services.campaigns.internal-api-key=${INTERNAL_API_KEY}
services.users.base-url=${SERVICES_USERS_BASE_URL:http://localhost:8081/api}
services.notifications.base-url=${SERVICES_NOTIFICATIONS_BASE_URL:http://localhost:8086/api}
services.notifications.internal-api-key=${INTERNAL_API_KEY}

mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
mercadopago.currency=${MERCADOPAGO_CURRENCY:CLP}

mercadopago.back-url.success=${MERCADOPAGO_BACK_URL_SUCCESS:http://localhost:5173/persona/mis-donaciones}
mercadopago.back-url.failure=${MERCADOPAGO_BACK_URL_FAILURE:http://localhost:5173/crowdfundings}
mercadopago.back-url.pending=${MERCADOPAGO_BACK_URL_PENDING:http://localhost:5173/persona/mis-donaciones}

mercadopago.auto-return=${MERCADOPAGO_AUTO_RETURN:none}
mercadopago.notification-url=${MERCADOPAGO_NOTIFICATION_URL:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}

donations.pending-expiry-minutes=${DONATIONS_PENDING_EXPIRY_MINUTES:60}
donations.expiry-check-ms=${DONATIONS_EXPIRY_CHECK_MS:1800000}
donations.sync-check-ms=${DONATIONS_SYNC_CHECK_MS:20000}

paw.security.jwt-secret=${JWT_SECRET}
paw.security.forwarded-headers-enabled=false