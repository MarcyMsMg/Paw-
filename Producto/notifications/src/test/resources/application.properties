spring.datasource.url=jdbc:h2:mem:notifications;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=false
paw.security.jwt-secret=TestJwtSecretKeyForNotifications1234567890
paw.services.users.base-url=http://localhost:8081/api
paw.services.users.internal-api-key=test-internal-key
paw.notifications.internal-api-key=test-internal-key
paw.cors.allowed-origins=http://localhost:5173
paw.notifications.rabbit.enabled=false