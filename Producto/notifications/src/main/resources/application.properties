spring.application.name=ms-notifications
server.port=${PORT:${SERVER_PORT:8086}}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:1}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:600000}
spring.datasource.hikari.initialization-fail-timeout=${SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT:1}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.default_schema=notifications_schema
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=${HIBERNATE_BOOT_ALLOW_JDBC_METADATA_ACCESS:true}
spring.jpa.open-in-view=false

paw.security.jwt-secret=${JWT_SECRET}
paw.security.forwarded-headers-enabled=false

paw.services.users.base-url=${SERVICES_USERS_BASE_URL:http://localhost:8081/api}
paw.services.users.internal-api-key=${INTERNAL_API_KEY}

paw.notifications.internal-api-key=${INTERNAL_API_KEY}

paw.cors.allowed-origins=${NOTIFICATIONS_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173,http://127.0.0.1:8080,http://127.0.0.1:5173}

paw.notifications.rabbit.enabled=${NOTIFICATIONS_RABBIT_ENABLED:false}
paw.notifications.rabbit.exchange=${NOTIFICATIONS_RABBIT_EXCHANGE:paw.events}
paw.notifications.rabbit.queue=${NOTIFICATIONS_RABBIT_QUEUE:notifications.queue}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}