name: PAW+ Backend CI/CD - Docker Hub + Render

on:
  push:
    branches:
      - main
    paths:
      - "apigateway/**"
      - "Users/users/**"
      - "crowdfunding/**"
      - "donations/**"
      - "adoptions/adoptions/**"
      - "feed/**"
      - "notifications/**"
      - ".github/workflows/pawplus-backend-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pawplus-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
  JWT_SECRET: test-secret-key-with-at-least-32-bytes
  INTERNAL_API_KEY: test-internal-api-key
  PAWPLUS_ADMIN_PASSWORD: TestAdmin123456
  MERCADOPAGO_ACCESS_TOKEN: TEST-0000000000000000
  MERCADOPAGO_WEBHOOK_SECRET: test-webhook-secret
  MERCADOPAGO_NOTIFICATION_URL: ""
  MERCADOPAGO_BACK_URL_SUCCESS: http://localhost:5173/persona/mis-donaciones
  MERCADOPAGO_BACK_URL_FAILURE: http://localhost:5173/crowdfundings
  MERCADOPAGO_BACK_URL_PENDING: http://localhost:5173/persona/mis-donaciones
  SERVICES_USERS_BASE_URL: http://localhost:8081/api
  SERVICES_CAMPAIGNS_BASE_URL: http://localhost:8082/api
  SERVICES_NOTIFICATIONS_BASE_URL: http://localhost:8086/api

jobs:
  test-backend:
    name: Test backend - ${{ matrix.service.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: apigateway
          - name: users
            context: Users/users
          - name: campaigns
            context: crowdfunding
          - name: donations
            context: donations
          - name: adoptions
            context: adoptions/adoptions
          - name: feed
            context: feed
          - name: notifications
            context: notifications

    defaults:
      run:
        working-directory: ${{ matrix.service.context }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Maven tests
        run: ./mvnw -B test

  build-and-push-images:
    name: Build and push image - ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    needs: test-backend

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            context: ./apigateway
            image: pawplus-api-gateway
          - name: users
            context: ./Users/users
            image: pawplus-users
          - name: campaigns
            context: ./crowdfunding
            image: pawplus-campaigns
          - name: donations
            context: ./donations
            image: pawplus-donations
          - name: adoptions
            context: ./adoptions/adoptions
            image: pawplus-adoptions
          - name: feed
            context: ./feed
            image: pawplus-feed
          - name: notifications
            context: ./notifications
            image: pawplus-notifications

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.service.image }}:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.service.image }}:${{ github.sha }}

  redeploy-render:
    name: Trigger Render redeploys
    runs-on: ubuntu-latest
    needs: build-and-push-images

    steps:
      - name: Trigger Users redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_USERS"
        env:
          RENDER_DEPLOY_HOOK_USERS: ${{ secrets.RENDER_DEPLOY_HOOK_USERS }}

      - name: Trigger Notifications redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_NOTIFICATIONS"
        env:
          RENDER_DEPLOY_HOOK_NOTIFICATIONS: ${{ secrets.RENDER_DEPLOY_HOOK_NOTIFICATIONS }}

      - name: Trigger Campaigns redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_CAMPAIGNS"
        env:
          RENDER_DEPLOY_HOOK_CAMPAIGNS: ${{ secrets.RENDER_DEPLOY_HOOK_CAMPAIGNS }}

      - name: Trigger Adoptions redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_ADOPTIONS"
        env:
          RENDER_DEPLOY_HOOK_ADOPTIONS: ${{ secrets.RENDER_DEPLOY_HOOK_ADOPTIONS }}

      - name: Trigger Feed redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_FEED"
        env:
          RENDER_DEPLOY_HOOK_FEED: ${{ secrets.RENDER_DEPLOY_HOOK_FEED }}

      - name: Trigger Donations redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_DONATIONS"
        env:
          RENDER_DEPLOY_HOOK_DONATIONS: ${{ secrets.RENDER_DEPLOY_HOOK_DONATIONS }}

      - name: Trigger API Gateway redeploy
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_API_GATEWAY"
        env:
          RENDER_DEPLOY_HOOK_API_GATEWAY: ${{ secrets.RENDER_DEPLOY_HOOK_API_GATEWAY }}
