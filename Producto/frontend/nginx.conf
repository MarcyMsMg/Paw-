server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Soporte para rutas de React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache básica para assets generados por Vite
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
